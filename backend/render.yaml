services:
  - type: web
    name: clinica-backend
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        value: "postgresql://user:password@hostname:5432/dbname" # Update with Supabase URL
